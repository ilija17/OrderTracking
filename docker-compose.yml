services:
  app:
    container_name: ShipmentTracking
    build: .
    ports:
      - "3333:3000"
    volumes:
      - ./persist/data:/app/data
    environment:
      # Generate with: openssl rand -base64 32
      # Must be at least 32 characters. Copy .env.example to .env and set this value.
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD:?Set NUXT_SESSION_PASSWORD in a .env file (see .env.example)}
    restart: unless-stopped
